<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blok — BitBudCoin</title>
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
</head>
<body>

<nav class="nav">
    <a href="index.html" class="brand"><img src="assets/logo.svg" alt="BitBudCoin"> BitBudCoin</a>
    <div class="nav-links">
        <a href="index.html" id="nav-index">Start</a>
        <a href="dashboard.html" id="nav-dashboard">Dashboard</a>
        <a href="explorer.html" id="nav-explorer">Explorer</a>
        <a href="miner.html" id="nav-miner">Miner</a>
        <a href="network.html" id="nav-network">Sieć</a>
        <a href="peers.html" id="nav-peers">Peery</a>
        <a href="exchange.html" id="nav-exchange">Giełda</a>
        <a href="address.html" id="nav-address">Adres</a>
        <a href="docks.html" id="nav-docks">Docs</a>
    </div>
    <div class="nav-status">
        <span class="flame-pill" id="nav-status"><span class="flame-dot"></span><span id="nav-status-text">łączę…</span></span>
    </div>
</nav>

<div class="page" id="content">
    <p style="margin-top:32px;"><a href="explorer.html">← wróć do explorera</a></p>
    <div class="skeleton" style="height:200px; border-radius:12px;"></div>
</div>

<footer>BitBudCoin (BbC) · sieć proof-of-work · <a href="docks.html">dokumentacja</a></footer>

<script src="assets/api.js"></script>
<script src="assets/nav.js"></script>
<script>
setActiveNav("nav-explorer");

function badgeFor(type) {
    return `<span class="badge ${type}">${type}</span>`;
}

async function load() {
    const params = new URLSearchParams(location.search);
    const height = params.get("height");
    const content = document.getElementById("content");

    if (height === null) {
        content.innerHTML = '<p style="margin-top:32px;"><a href="explorer.html">← wróć do explorera</a></p><div class="empty-state"><div class="glyph">🔎</div>Brak numeru bloku w adresie. Wróć do explorera i kliknij blok.</div>';
        return;
    }

    try {
        const b = await apiGet(`/blocks/${height}`);
        const prevLink = b.height > 0 ? `<a href="block.html?height=${b.height - 1}">← blok ${b.height - 1}</a>` : "<span style='color:var(--text-dim)'>genesis</span>";
        content.innerHTML = `
            <p style="margin-top:32px;"><a href="explorer.html">← wróć do explorera</a></p>
            <h1>Blok #${b.height}</h1>
            <div class="grid cols-2">
                <div class="card">
                    <div class="card-label">Hash</div>
                    <div class="mono" style="word-break:break-all; font-size:0.85rem;">${b.hash}</div>
                </div>
                <div class="card">
                    <div class="card-label">Poprzedni hash</div>
                    <div class="mono" style="word-break:break-all; font-size:0.85rem;">${b.previousHash}</div>
                </div>
                <div class="card"><div class="card-label">Czas</div><div class="card-value" style="font-size:1.1rem;">${fmtTime(b.timestamp)}</div></div>
                <div class="card"><div class="card-label">Trudność / nonce</div><div class="card-value" style="font-size:1.1rem;">${fmtNumber(b.difficulty, 0)} / ${fmtNumber(b.nonce, 0)}</div></div>
            </div>

            <h2 style="margin-top:28px;">Transakcje (${b.transactions.length})</h2>
            <div class="card" style="padding:0; overflow:hidden;">
                <table>
                    <thead><tr><th>Typ</th><th>Od</th><th>Do</th><th>Kwota</th></tr></thead>
                    <tbody>
                        ${b.transactions.map(tx => `
                            <tr>
                                <td>${badgeFor(tx.type)}</td>
                                <td>${tx.from ? `<a href="address.html?address=${encodeURIComponent(tx.from)}" class="truncate">${fmtAddress(tx.from)}</a>` : '<span style="color:var(--text-dim)">— nowa emisja —</span>'}</td>
                                <td><a href="address.html?address=${encodeURIComponent(tx.to)}" class="truncate">${fmtAddress(tx.to)}</a></td>
                                <td>${fmtNumber(tx.amount)}${tx.fee ? ` <span style="color:var(--text-dim)">(+${fmtNumber(tx.fee)} opłaty)</span>` : ""}</td>
                            </tr>`).join("")}
                    </tbody>
                </table>
            </div>
            <p style="margin-top:16px;">${prevLink} · <a href="block.html?height=${b.height + 1}">blok ${b.height + 1} →</a></p>
        `;
    } catch (e) {
        content.innerHTML = `<p style="margin-top:32px;"><a href="explorer.html">← wróć do explorera</a></p><div class="empty-state"><div class="glyph">✕</div>Nie znaleziono bloku #${escapeHtml(height)}</div>`;
    }
}
load();
</script>
</body>
</html>
