<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blok — BitBudCoin</title>
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
</head>
<body>

<div class="page">
    <div style="margin-top:32px;">
        <a href="explorer.html" style="color:var(--text-dim); font-size:0.85rem;" data-i18n="block_back_to_journal">← Dziennik łańcucha</a>
    </div>
    <h1 style="margin-top:10px;"><span data-i18n="explorer_block_label">Blok</span> #<span id="block-height-title">—</span></h1>
    <div id="error-box"></div>

    <div class="card">
        <table><tbody id="meta-tbody">
            <tr><td colspan="2" class="skeleton">ładowanie ładowanie ładowanie</td></tr>
        </tbody></table>
    </div>

    <h2 style="margin-top:24px;"><span data-i18n="block_tx_heading">Transakcje</span> (<span id="tx-count">—</span>)</h2>
    <div class="card" style="padding:0; overflow:hidden;">
        <table>
            <thead><tr><th data-i18n="address_th_type">Typ</th><th data-i18n="block_th_from">Od</th><th data-i18n="block_th_to">Do</th><th data-i18n="address_th_amount">Kwota</th></tr></thead>
            <tbody id="tx-tbody">
                <tr><td colspan="4" class="skeleton">ładowanie ładowanie</td></tr>
            </tbody>
        </table>
    </div>
</div>

<footer><span data-i18n="footer_text">BitBudCoin (BbC) · sieć proof-of-work</span> · <a href="docks.html" data-i18n="footer_docs_link">dokumentacja</a></footer>

<script src="assets/api.js"></script>
<script src="assets/nav.js"></script>
<script src="assets/native-responsive.js"></script>
<script src="assets/i18n.js"></script>
<script>
setActiveNav("nav-explorer");

function badgeFor(type) { return `<span class="badge ${type}">${type}</span>`; }

function truncAddr(a) {
    return a && a.length > 18 ? `${a.slice(0, 10)}...${a.slice(-6)}` : (a || "");
}

function addrLink(a, fallbackHtml) {
    if (!a) return fallbackHtml || '<span style="color:var(--text-dim)">—</span>';
    return `<a href="address.html?address=${encodeURIComponent(a)}" class="mono">${truncAddr(a)}</a>`;
}

async function load() {
    const height = new URLSearchParams(location.search).get("height");
    if (height === null) {
        document.getElementById("error-box").innerHTML = `<div class="error-banner">${t("block_no_height")}</div>`;
        document.getElementById("meta-tbody").innerHTML = "";
        document.getElementById("tx-tbody").innerHTML = "";
        return;
    }
    document.getElementById("block-height-title").textContent = height;

    try {
        const block = await apiGet(`/blocks/${encodeURIComponent(height)}`);
        document.title = `${t("explorer_block_label")} #${block.height} — BitBudCoin`;
        document.getElementById("block-height-title").textContent = block.height;

        document.getElementById("meta-tbody").innerHTML = `
            <tr><td style="color:var(--text-dim); width:35%;">${t("block_hash_label")}</td><td class="mono" style="word-break:break-all;">${escapeHtml(block.hash)}</td></tr>
            <tr><td style="color:var(--text-dim);">${t("block_prev_hash_label")}</td><td class="mono" style="word-break:break-all;">${block.height === 0 ? `<span style="color:var(--text-dim)">${t("block_genesis_note")}</span>` : escapeHtml(block.previousHash)}</td></tr>
            <tr><td style="color:var(--text-dim);">${t("block_when_label")}</td><td>${timeAgo(block.timestamp)}</td></tr>
            <tr><td style="color:var(--text-dim);">${t("index_stat_difficulty")}</td><td>${fmtNumber(block.difficulty, 0)}</td></tr>
            <tr><td style="color:var(--text-dim);">${t("block_nonce_label")}</td><td class="mono">${fmtNumber(block.nonce, 0)}</td></tr>`;

        const txs = block.transactions || [];
        document.getElementById("tx-count").textContent = txs.length;
        document.getElementById("tx-tbody").innerHTML = txs.length === 0
            ? `<tr><td colspan="4"><div class="empty-state"><div class="glyph">🍃</div>${t("block_no_transactions")}</div></td></tr>`
            : txs.map((tx) => `
                <tr>
                    <td>${badgeFor(tx.type)}</td>
                    <td>${addrLink(tx.from, `<span style="color:var(--text-dim)">${t("block_new_coins")}</span>`)}</td>
                    <td>${addrLink(tx.to)}</td>
                    <td>${fmtNumber(tx.amount)}${tx.fee ? ` <span style="color:var(--text-dim); font-size:0.8em;">(+${fmtNumber(tx.fee)} ${t("block_fee_suffix")})</span>` : ""}</td>
                </tr>`).join("");
    } catch (e) {
        document.getElementById("error-box").innerHTML = `<div class="error-banner">${escapeHtml(e.message)}</div>`;
        document.getElementById("meta-tbody").innerHTML = "";
        document.getElementById("tx-tbody").innerHTML = "";
    }
}

load();
document.addEventListener("bbc:langchange", load);
</script>
</body>
</html>
