<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blok — BitBudCoin</title>
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
</head>
<body>

<div class="page">
    <div style="margin-top:32px;">
        <a href="explorer.html" style="color:var(--text-dim); font-size:0.85rem;">← Dziennik łańcucha</a>
    </div>
    <h1 style="margin-top:10px;">Blok #<span id="block-height-title">—</span></h1>
    <div id="error-box"></div>

    <div class="card">
        <table><tbody id="meta-tbody">
            <tr><td colspan="2" class="skeleton">ładowanie ładowanie ładowanie</td></tr>
        </tbody></table>
    </div>

    <h2 style="margin-top:24px;">Transakcje (<span id="tx-count">—</span>)</h2>
    <div class="card" style="padding:0; overflow:hidden;">
        <table>
            <thead><tr><th>Typ</th><th>Od</th><th>Do</th><th>Kwota</th></tr></thead>
            <tbody id="tx-tbody">
                <tr><td colspan="4" class="skeleton">ładowanie ładowanie</td></tr>
            </tbody>
        </table>
    </div>
</div>

<footer>BitBudCoin (BbC) · sieć proof-of-work · <a href="docks.html">dokumentacja</a></footer>

<script src="assets/api.js"></script>
<script src="assets/nav.js"></script>
<script src="assets/native-responsive.js"></script>
<script>
setActiveNav("nav-explorer");

function badgeFor(type) { return `<span class="badge ${type}">${type}</span>`; }

function truncAddr(a) {
    return a && a.length > 18 ? `${a.slice(0, 10)}...${a.slice(-6)}` : (a || "");
}

function addrLink(a, fallbackHtml) {
    if (!a) return fallbackHtml || '<span style="color:var(--text-dim)">—</span>';
    return `<a href="address.html?address=${encodeURIComponent(a)}" class="mono">${truncAddr(a)}</a>`;
}

async function load() {
    const height = new URLSearchParams(location.search).get("height");
    if (height === null) {
        document.getElementById("error-box").innerHTML = `<div class="error-banner">Brak wysokości bloku w adresie.</div>`;
        document.getElementById("meta-tbody").innerHTML = "";
        document.getElementById("tx-tbody").innerHTML = "";
        return;
    }
    document.getElementById("block-height-title").textContent = height;

    try {
        const block = await apiGet(`/blocks/${encodeURIComponent(height)}`);
        document.title = `Blok #${block.height} — BitBudCoin`;
        document.getElementById("block-height-title").textContent = block.height;

        document.getElementById("meta-tbody").innerHTML = `
            <tr><td style="color:var(--text-dim); width:35%;">Hash</td><td class="mono" style="word-break:break-all;">${escapeHtml(block.hash)}</td></tr>
            <tr><td style="color:var(--text-dim);">Poprzedni hash</td><td class="mono" style="word-break:break-all;">${block.height === 0 ? '<span style="color:var(--text-dim)">— (genesis)</span>' : escapeHtml(block.previousHash)}</td></tr>
            <tr><td style="color:var(--text-dim);">Kiedy</td><td>${timeAgo(block.timestamp)}</td></tr>
            <tr><td style="color:var(--text-dim);">Trudność</td><td>${fmtNumber(block.difficulty, 0)}</td></tr>
            <tr><td style="color:var(--text-dim);">Nonce</td><td class="mono">${fmtNumber(block.nonce, 0)}</td></tr>`;

        const txs = block.transactions || [];
        document.getElementById("tx-count").textContent = txs.length;
        document.getElementById("tx-tbody").innerHTML = txs.length === 0
            ? '<tr><td colspan="4"><div class="empty-state"><div class="glyph">🍃</div>Brak transakcji w tym bloku</div></td></tr>'
            : txs.map((tx) => `
                <tr>
                    <td>${badgeFor(tx.type)}</td>
                    <td>${addrLink(tx.from, '<span style="color:var(--text-dim)">— (nowe monety)</span>')}</td>
                    <td>${addrLink(tx.to)}</td>
                    <td>${fmtNumber(tx.amount)}${tx.fee ? ` <span style="color:var(--text-dim); font-size:0.8em;">(+${fmtNumber(tx.fee)} opłaty)</span>` : ""}</td>
                </tr>`).join("");
    } catch (e) {
        document.getElementById("error-box").innerHTML = `<div class="error-banner">${escapeHtml(e.message)}</div>`;
        document.getElementById("meta-tbody").innerHTML = "";
        document.getElementById("tx-tbody").innerHTML = "";
    }
}

load();
</script>
</body>
</html>
