<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peery — BitBudCoin</title>
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
</head>
<body>

<div class="page">
    <h1 style="margin-top:32px;">Peery P2P</h1>

    <div class="grid cols-2">
        <div class="card">
            <h3>Połącz z nowym peerem</h3>
            <div class="field">
                <label for="peer-address">Adres (host:port)</label>
                <input id="peer-address" placeholder="203.0.113.10:6001">
            </div>
            <button class="btn" id="connect-btn">Połącz</button>
            <div id="connect-result" style="margin-top:12px;"></div>
        </div>
        <div class="card">
            <h3>Status węzła</h3>
            <div id="peers-summary"><p class="skeleton">ładowanie ładowanie</p></div>
        </div>
    </div>

    <div class="grid cols-3" style="margin-top:20px;">
        <div class="card"><h3>Połączeni</h3><ul id="list-connected" class="mono" style="padding-left:18px; margin:0;"></ul></div>
        <div class="card"><h3>Skonfigurowani</h3><ul id="list-configured" class="mono" style="padding-left:18px; margin:0;"></ul></div>
        <div class="card"><h3>Łączą się ponownie</h3><ul id="list-reconnecting" class="mono" style="padding-left:18px; margin:0;"></ul></div>
    </div>
</div>

<footer>BitBudCoin (BbC) · sieć proof-of-work · <a href="docks.html">dokumentacja</a></footer>

<script src="assets/api.js"></script>
<script src="assets/nav.js"></script>
<script src="assets/native-responsive.js"></script>
<script>
setActiveNav("nav-peers");

function fillList(id, items) {
    const el = document.getElementById(id);
    el.innerHTML = items.length ? items.map(p => `<li>${escapeHtml(p)}</li>`).join("") : '<li style="color:var(--text-dim); list-style:none; margin-left:-18px;">— brak —</li>';
}

async function load() {
    try {
        const p = await apiGet("/peers");
        document.getElementById("peers-summary").innerHTML = `
            <div style="display:flex; justify-content:space-between; padding:6px 0;"><span style="color:var(--text-dim)">Port P2P</span><span class="mono">${p.port}</span></div>
            <div style="display:flex; justify-content:space-between; padding:6px 0;"><span style="color:var(--text-dim)">Połączeni peerzy</span><span class="mono">${p.connected.length}</span></div>`;
        fillList("list-connected", p.connected);
        fillList("list-configured", p.configured);
        fillList("list-reconnecting", p.reconnecting);
    } catch (e) {
        document.getElementById("peers-summary").innerHTML = `<div class="error-banner">${escapeHtml(e.message)}</div>`;
    }
}

document.getElementById("connect-btn").addEventListener("click", async () => {
    const addr = document.getElementById("peer-address").value.trim();
    const box = document.getElementById("connect-result");
    if (!addr) { box.innerHTML = '<div class="error-banner">Podaj adres w formacie host:port</div>'; return; }
    try {
        await apiPost("/peers/connect", { address: addr });
        box.innerHTML = `<p style="color:var(--leaf)">Łączenie z ${escapeHtml(addr)} zainicjowane.</p>`;
        setTimeout(load, 1000);
    } catch (e) {
        box.innerHTML = `<div class="error-banner">${escapeHtml(e.message)}</div>`;
    }
});

load();
setInterval(load, 10000);
</script>
</body>
</html>
