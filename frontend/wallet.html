<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>BBC Portfel – balans adresu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; font-family: system-ui; background:#050608; color:#e5f7ea; }
    main { max-width:600px; margin:0 auto; padding:1.5rem; }
    h1 { margin:0 0 0.5rem; }
    p { margin:0 0 1rem; color:#7f8b86; }
    .card {
      background:#0b0e13;
      border-radius:16px;
      border:1px solid #202530;
      padding:1.1rem;
      box-shadow:0 18px 40px rgba(0,0,0,0.6);
    }
    label { display:block; font-size:0.85rem; margin-bottom:0.3rem; color:#7f8b86; }
    input {
      width:100%;
      padding:0.5rem 0.7rem;
      border-radius:999px;
      border:1px solid #202530;
      background:#050608;
      color:#e5f7ea;
      outline:none;
      font-size:0.9rem;
    }
    input:focus {
      border-color:#35ff7a;
      box-shadow:0 0 10px rgba(53,255,122,0.5);
    }
    button {
      margin-top:0.7rem;
      width:100%;
      padding:0.55rem 0.8rem;
      border-radius:999px;
      border:none;
      background:#1b3b26;
      color:#35ff7a;
      font-weight:600;
      cursor:pointer;
      font-size:0.9rem;
      box-shadow:0 0 12px rgba(53,255,122,0.4);
    }
    button:hover { filter:brightness(1.1); }
    .result {
      margin-top:0.8rem;
      font-size:0.9rem;
    }
    .error { color:#ff4b6b; font-size:0.8rem; margin-top:0.4rem; }
    a.back {
      display:inline-block;
      margin-bottom:0.8rem;
      font-size:0.85rem;
      color:#35ff7a;
      text-decoration:none;
    }
  </style>
</head>
<body>
<main>
  <a href="index.html" class="back">← Powrót do hubu</a>
  <h1>BBC Portfel</h1>
  <p>Sprawdź balans dowolnego adresu w sieci BitBudCoiN. Idealne do testów i zabawy z nagrodami.</p>

  <div class="card">
    <label for="address">Adres BBC (np. hash portfela)</label>
    <input id="address" placeholder="Wklej lub wpisz adres...">
    <button onclick="checkBalance()">Sprawdź balans</button>
    <div class="result" id="result"></div>
    <div class="error" id="error"></div>
  </div>
</main>

<script>
  const API_BASE = "https://twoj-backend-url"; // PODMIEŃ

  async function checkBalance() {
    const addr = document.getElementById("address").value.trim();
    const resultEl = document.getElementById("result");
    const errorEl = document.getElementById("error");
    resultEl.textContent = "";
    errorEl.textContent = "";

    if (!addr) {
      errorEl.textContent = "Podaj adres, żeby sprawdzić balans.";
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/balance/${encodeURIComponent(addr)}`);
      if (!res.ok) throw new Error("Backend niedostępny");
      const data = await res.json();
      resultEl.textContent = `Adres: ${data.address} • Balans: ${data.balance} BBC`;
    } catch (e) {
      errorEl.textContent = "Nie udało się pobrać balansu. Sprawdź backend.";
    }
  }
</script>
</body>
</html>
