<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>BBC Koparka – kopanie bloków</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; font-family:system-ui; background:#050608; color:#e5f7ea; }
    main { max-width:700px; margin:0 auto; padding:1.5rem; }
    h1 { margin:0 0 0.5rem; }
    p { margin:0 0 1rem; color:#7f8b86; }
    .card {
      background:#0b0e13;
      border-radius:16px;
      border:1px solid #202530;
      padding:1.1rem;
      box-shadow:0 18px 40px rgba(0,0,0,0.6);
    }
    label { display:block; font-size:0.85rem; margin-bottom:0.3rem; color:#7f8b86; }
    input, select {
      width:100%;
      padding:0.5rem 0.7rem;
      border-radius:999px;
      border:1px solid #202530;
      background:#050608;
      color:#e5f7ea;
      outline:none;
      font-size:0.9rem;
      margin-bottom:0.5rem;
    }
    input:focus, select:focus {
      border-color:#35ff7a;
      box-shadow:0 0 10px rgba(53,255,122,0.5);
    }
    button {
      margin-top:0.4rem;
      width:100%;
      padding:0.55rem 0.8rem;
      border-radius:999px;
      border:none;
      background:#1b3b26;
      color:#35ff7a;
      font-weight:600;
      cursor:pointer;
      font-size:0.9rem;
      box-shadow:0 0 12px rgba(53,255,122,0.4);
    }
    button:hover { filter:brightness(1.1); }
    .result { margin-top:0.8rem; font-size:0.9rem; }
    .error { color:#ff4b6b; font-size:0.8rem; margin-top:0.4rem; }
    .models { font-size:0.85rem; margin-top:0.6rem; color:#7f8b86; }
    a.back { display:inline-block; margin-bottom:0.8rem; font-size:0.85rem; color:#35ff7a; text-decoration:none; }
  </style>
</head>
<body>
<main>
  <a href="index.html" class="back">← Powrót do hubu</a>
  <h1>BBC Koparka</h1>
  <p>Wybierz model koparki, podaj adres i spróbuj wykopać blok. Backend zadba o resztę.</p>

  <div class="card">
    <label for="minerAddress">Adres kopacza (odbiorca nagrody)</label>
    <input id="minerAddress" placeholder="Adres BBC, na który trafi nagroda...">

    <label for="model">Model koparki</label>
    <select id="model"></select>

    <button onclick="startMining()">Rozpocznij kopanie</button>

    <div class="models" id="modelsInfo"></div>
    <div class="result" id="result"></div>
    <div class="error" id="error"></div>
  </div>
</main>

<script>
  const API_BASE = "https://twoj-backend-url"; // PODMIEŃ

  async function loadModels() {
    const select = document.getElementById("model");
    const info = document.getElementById("modelsInfo");
    try {
      const res = await fetch(API_BASE + "/miners/models");
      if (!res.ok) throw new Error("Backend niedostępny");
      const models = await res.json();
      select.innerHTML = "";
      models.forEach(m => {
        const opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = `${m.name} (${m.hashRate} H/s)`;
        select.appendChild(opt);
      });
      info.textContent = "Modele dostępne w sieci BBC: " +
        models.map(m => `${m.name} (${m.hashRate} H/s)`).join(", ");
    } catch (e) {
      info.textContent = "Nie udało się pobrać modeli koparek. Backend może być offline.";
    }
  }

  async function startMining() {
    const addr = document.getElementById("minerAddress").value.trim();
    const model = document.getElementById("model").value;
    const resultEl = document.getElementById("result");
    const errorEl = document.getElementById("error");
    resultEl.textContent = "";
    errorEl.textContent = "";

    if (!addr) {
      errorEl.textContent = "Podaj adres, na który ma trafić nagroda.";
      return;
    }

    try {
      const res = await fetch(API_BASE + "/mine/start", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ minerAddress: addr, model })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || "Błąd kopania");
      }
      const data = await res.json();
      resultEl.textContent =
        `Status: ${data.status} • Wysokość bloku: ${data.blockHeight} • Hash: ${data.hash} • Nagroda: ${data.reward} BBC`;
    } catch (e) {
      errorEl.textContent = "Nie udało się wykopać bloku: " + e.message;
    }
  }

  loadModels();
</script>
</body>
</html>
