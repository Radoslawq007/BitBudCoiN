<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC Mining Network - vMax Control Panel</title>
    <style>
        /* MROCZNY MOTYW BAZOWY */
        :root {
            --bg-color: #06080c;
            --card-bg: #0d1117;
            --neon-green: #00ff66;
            --neon-blue: #00d2ff;
            --text-color: #e2e8f0;
            --text-muted: #8b949e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ZIELONY NEONOWY DYM (EFEKT W TLE) */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 102, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
            animation: smokeMovement 10s infinite alternate ease-in-out;
        }
        body::before { top: -100px; left: -100px; }
        body::after { bottom: -100px; right: -100px; animation-delay: 5s; }

        @keyframes smokeMovement {
            0% { transform: translate(0, 0) scale(1); filter: blur(60px); }
            100% { transform: translate(80px, 50px) scale(1.2); filter: blur(80px); rgba(0, 255, 102, 0.25); }
        }

        /* NAGŁÓWEK Z LOGO KONOPI */
        header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(13, 17, 23, 0.8);
            border-bottom: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
            backdrop-filter: blur(10px);
        }

        .logo-container {
            margin-bottom: 10px;
        }

        /* JASNO ZIELONA KONOPIA INDYJSKA (SVG NEON) */
        .cannabis-icon {
            width: 80px;
            height: 80px;
            fill: var(--neon-green);
            filter: drop-shadow(0 0 12px var(--neon-green));
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 8px var(--neon-green)); }
            100% { filter: drop-shadow(0 0 20px var(--neon-green)); }
        }

        header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-green);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* UKŁAD STRONY */
        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
        }

        /* SEKCJE / KARTY */
        .panel {
            background: var(--card-bg);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        /* Efekt poświaty dymu na panelach */
        .panel::border-inside {
            box-shadow: inset 0 0 15px rgba(0, 255, 102, 0.05);
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            border-left: 4px solid var(--neon-green);
            padding-left: 10px;
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.5);
        }

        /* FORMULARZE I PRZYCISKI */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #161b22;
            border: 1px solid rgba(0, 255, 102, 0.3);
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 210, 255
