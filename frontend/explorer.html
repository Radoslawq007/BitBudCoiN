<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorer — BitBudCoin</title>
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<style>
  .journal-entry { border-left: 3px solid var(--leaf-dim); padding: 14px 0 14px 18px; margin-bottom: 4px; cursor: pointer; transition: border-color .15s; }
  .journal-entry:hover { border-left-color: var(--leaf); background: var(--surface-2); }
  .journal-entry .je-height { font-family: var(--font-display); font-weight: 600; color: var(--leaf); font-size: 1.05rem; }
  .journal-entry .je-story { color: var(--text); font-size: .92rem; margin: 4px 0; line-height: 1.5; }
  .journal-entry .je-meta { font-family: var(--font-mono); font-size: .74rem; color: var(--text-dim); }
</style>
</head>
<body>

<div class="page">
    <h1 style="margin-top:32px;">Dziennik łańcucha</h1>
    <p>Każdy wykopany blok to prawdziwa chwila czyjejś pracy. Kliknij wpis, żeby zobaczyć pełne transakcje.</p>
    <div id="error-box"></div>

    <div class="card" style="padding:8px 20px;">
        <div id="blocks-journal">
            <div class="skeleton" style="height:80px;margin-bottom:8px;"></div>
        </div>
    </div>

    <div style="text-align:center; margin-top:20px;">
        <button class="btn secondary" id="load-more" style="display:none;">Wczytaj starsze bloki</button>
    </div>
</div>

<footer>BitBudCoin (BbC) · sieć proof-of-work · <a href="docks.html">dokumentacja</a></footer>

<script src="assets/api.js"></script>
<script src="assets/nav.js"></script>
<script src="assets/native-responsive.js"></script>
<script>
setActiveNav("nav-explorer");

let oldestLoaded = null;
let lastKnownTimestamp = null; // do liczenia "ile to trwało" dla kolejnych doładowań

function blockStory(block, previousTimestamp) {
    const coinbase = block.transactions.find(t => t.type === "coinbase" || t.type === "genesis");
    const txCount = block.transactions.length;
    const otherTx = txCount - 1;

    if (block.height === 0) {
        return `Początek. Pierwszy blok tego łańcucha, zapisany na stałe — ${fmtNumber(coinbase ? coinbase.amount : 0)} BbC rozdane na start.`;
    }

    let durationText = "";
    if (previousTimestamp) {
        const seconds = Math.max(0, Math.round((block.timestamp - previousTimestamp) / 1000));
        if (seconds < 3600) durationText = seconds < 60 ? `${seconds}s` : `${Math.round(seconds / 60)} min`;
        // Powyżej godziny to prawdopodobnie sztuczna przerwa (np. sąsiedztwo
        // genesis, który ma zawsze tę samą, ustaloną datę) - nie prawdziwy
        // czas kopania, więc nie pokazujemy mylącej liczby.
    }

    const workPhrase = durationText
        ? `Ktoś spędził ${durationText}, żeby to udowodnić`
        : `Ktoś udowodnił prawdziwą pracę`;

    const txPhrase = otherTx > 0
        ? ` — przy okazji ${otherTx} ${otherTx === 1 ? "transakcja przeszła" : "transakcje przeszły"} do historii.`
        : `.`;

    return `${workPhrase}${txPhrase}`;
}

function renderJournal(blocks, append) {
    const container = document.getElementById("blocks-journal");
    const html = blocks.map((b, i) => {
        const prevTs = blocks[i + 1] ? blocks[i + 1].timestamp : (i === blocks.length - 1 ? lastKnownTimestamp : null);
        const story = blockStory(b, prevTs);
        return `<div class="journal-entry" onclick="location.href='block.html?height=${b.height}'">
            <div class="je-height">Blok #${b.height} <span style="color:var(--text-dim);font-weight:400;font-size:.8rem;">· ${timeAgo(b.timestamp)}</span></div>
            <div class="je-story">${story}</div>
            <div class="je-meta">trudność ${fmtNumber(b.difficulty, 0)} · ${fmtHash(b.hash)}</div>
        </div>`;
    }).join("");
    container.innerHTML = append ? container.innerHTML + html : html;
    if (blocks.length > 0) lastKnownTimestamp = blocks[blocks.length - 1].timestamp;
}

async function loadInitial() {
    try {
        const blocks = await apiGet("/blocks?limit=15");
        if (blocks.length === 0) {
            document.getElementById("blocks-journal").innerHTML = '<div class="empty-state"><div class="glyph">🌱</div>Tylko genesis na razie — wykop pierwszy blok w <a href="miner.html">Minerze</a></div>';
            return;
        }
        renderJournal(blocks, false);
        oldestLoaded = blocks[blocks.length - 1].height;
        if (oldestLoaded > 0) document.getElementById("load-more").style.display = "inline-flex";
    } catch (e) {
        document.getElementById("error-box").innerHTML = `<div class="error-banner">Nie można połączyć się z backendem: ${escapeHtml(e.message)}</div>`;
        document.getElementById("blocks-journal").innerHTML = "";
    }
}

document.getElementById("load-more").addEventListener("click", async () => {
    const blocks = await apiGet(`/blocks?limit=15&before=${oldestLoaded}`);
    renderJournal(blocks, true);
    if (blocks.length === 0 || blocks[blocks.length - 1].height === 0) {
        document.getElementById("load-more").style.display = "none";
    } else {
        oldestLoaded = blocks[blocks.length - 1].height;
    }
});

loadInitial();
</script>
</body>
</html>
