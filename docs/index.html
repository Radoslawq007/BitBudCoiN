<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BitBudCoiN • Bud Bitcoin</title>
<style>
    body { margin:0; background:#0a0a0a; color:#e5e5e5; font-family:Consolas, monospace; }
    header { padding:80px 20px 60px; background:linear-gradient(#1a1a1a, #0a0a0a); text-align:center; }
    .logo { width:220px; filter:drop-shadow(0 0 25px #00ff88); }
    h1 { color:#00ffaa; font-size:42px; margin:15px 0; text-shadow:0 0 20px #00ff88; }
    .tagline { font-size:20px; color:#aaa; }
    .btn {
        display:inline-block; margin:15px; padding:18px 36px; background:#00ffaa; color:#000;
        font-weight:bold; font-size:18px; border-radius:8px; text-decoration:none;
    }
    .btn:hover { background:#00dd99; transform:scale(1.05); }
    section { padding:60px 20px; max-width:1000px; margin:auto; }
    .features { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:25px; }
    .card {
        background:#111; padding:25px; border-radius:10px; border:1px solid #222;
    }
</style>
</head>
<body>

<header>
    <img src="logo.png" class="logo">
    <h1>BitBudCoiN</h1>
    <p class="tagline">Decentralizowana kopalnia Bud Bitcoin</p>
    <div>
        <a class="btn" href="miner.html">🚀 Uruchom Koparkę vMax</a>
        <a class="btn" href="wallet.html">💰 Portfel</a>
    </div>
</header>

<section>
    <h2 style="text-align:center; color:#00ffaa;">Dlaczego BitBudCoiN?</h2>
    <div class="features">
        <div class="card">
            <h3>⚡ Szybkie kopanie</h3>
            <p>Modele vMax 1 / 2 Turbo / 3 Pro</p>
        </div>
        <div class="card">
            <h3>🌿 Cannabis Vibes</h3>
            <p>Krypto z ziołowym akcentem</p>
        </div>
        <div class="card">
            <h3>🔗 Własny blockchain</h3>
            <p>Pełna decentralizacja</p>
        </div>
    </div>
</section>

</body>
</html>
