<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BBC Settings • vMax</title>

<style>
    body { margin:0; background:#0a0a0a; color:#e5e5e5; font-family:Consolas, monospace; }
    header { background:#111; padding:20px; border-bottom:2px solid #222; display:flex; justify-content:space-between; align-items:center; }
    .logo { font-size:24px; color:#00ffaa; font-weight:bold; }
    a { color:#888; text-decoration:none; }
    main { max-width:900px; margin:30px auto; padding:20px; }

    .card { background:#111; border:1px solid #222; border-radius:10px; padding:25px; margin-bottom:25px; }
    .card h2 { margin-top:0; color:#00ffaa; }

    input { width:100%; padding:12px; background:#0f0f0f; border:1px solid #333; color:#eee; border-radius:6px; margin-bottom:15px; }
    button { width:100%; padding:14px; background:#00ffaa; color:#000; border:none; font-weight:bold; cursor:pointer; border-radius:6px; }
    button:hover { background:#00dd99; }

    .status { margin-top:10px; font-size:14px; color:#00ffaa; }
</style>
</head>

<body>

<header>
    <div class="logo">BBC SETTINGS vMax</div>
    <a href="index.html">← Home</a>
</header>

<main>

<div class="card">
    <h2>Ustawienia Node'a</h2>

    <label>Trudność (difficulty)</label>
    <input type="number" id="difficulty" placeholder="np. 4">

    <label>Nagroda za blok (reward)</label>
    <input type="number" id="reward" placeholder="np. 50">

    <label>Port API</label>
    <input type="number" id="apiPort" placeholder="np. 5000">

    <label>Port P2P</label>
    <input type="number" id="p2pPort" placeholder="np. 6001">

    <label>Genesis Address</label>
    <input type="text" id="genesisAddress" placeholder="BbC...">

    <button onclick="saveSettings()">Zapisz ustawienia</button>
    <div id="saveStatus" class="status"></div>
</div>

<div class="card">
    <h2>Reset Chainu (frontend‑only)</h2>
    <button onclick="resetChain()">Resetuj Chain</button>
    <div id="resetStatus" class="status"></div>
</div>

</main>

<script>
// Ładowanie ustawień z localStorage
function loadSettings() {
    document.getElementById("difficulty").value = localStorage.getItem("bbc_difficulty") || "";
    document.getElementById("reward").value = localStorage.getItem("bbc_reward") || "";
    document.getElementById("apiPort").value = localStorage.getItem("bbc_apiPort") || "";
    document.getElementById("p2pPort").value = localStorage.getItem("bbc_p2pPort") || "";
    document.getElementById("genesisAddress").value = localStorage.getItem("bbc_genesisAddress") || "";
}

// Zapisywanie ustawień
function saveSettings() {
    localStorage.setItem("bbc_difficulty", document.getElementById("difficulty").value);
    localStorage.setItem("bbc_reward", document.getElementById("reward").value);
    localStorage.setItem("bbc_apiPort", document.getElementById("apiPort").value);
    localStorage.setItem("bbc_p2pPort", document.getElementById("p2pPort").value);
    localStorage.setItem("bbc_genesisAddress", document.getElementById("genesisAddress").value);

    document.getElementById("saveStatus").textContent = "✔ Ustawienia zapisane!";
}

// Reset chainu (frontend-only)
function resetChain() {
    localStorage.removeItem("bbc_chain_cache");
    document.getElementById("resetStatus").textContent = "✔ Chain zresetowany (frontend-only)";
}

loadSettings();
</script>

</body>
</html>
