<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BBC Miner • vMax</title>
<style>
    body { margin:0; background:#0a0a0a; color:#e5e5e5; font-family:Consolas, monospace; text-align:center; }
    header { background:#111; padding:20px; border-bottom:2px solid #222; display:flex; justify-content:space-between; align-items:center; }
    .logo { font-size:24px; color:#00ffaa; font-weight:bold; }
    main { max-width:900px; margin:30px auto; padding:20px; }
    .models { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:20px; margin:30px 0; }
    .model-card { background:#111; border:2px solid #222; border-radius:10px; padding:20px; transition:0.3s; }
    .model-card:hover { border-color:#00ffaa; transform:translateY(-5px); }
    .hashrate { font-size:32px; font-weight:bold; color:#00ffaa; }
    button { width:100%; padding:14px; background:#00ffaa; color:#000; border:none; font-weight:bold; cursor:pointer; border-radius:6px; margin-top:15px; }
    button:hover { background:#00dd99; }
    #status { margin:25px 0; padding:20px; background:#111; border-radius:10px; min-height:80px; }
    .mining { animation: pulse 1.2s infinite alternate; color:#00ff88; }
    @keyframes pulse { from {opacity:0.6;} to {opacity:1;} }
</style>
</head>
<body>

<header>
    <div class="logo">BBC MINER vMax</div>
    <a href="index.html" style="color:#888">← Home</a>
</header>

<main>
    <h2>Wybierz model vMax</h2>
    <div class="models" id="modelsContainer"></div>
    
    <input type="text" id="minerAddress" placeholder="Twój adres BBC" style="width:80%;padding:12px;background:#111;border:1px solid #333;color:white;border-radius:6px;margin:15px 0;">
    <div id="status">Wybierz model i podaj adres...</div>
</main>

<script>
const API = "http://localhost:5000"; // ZMIEŃ PO WDROŻENIU

async function loadModels() {
    const res = await fetch(API + "/miners/models");
    const models = await res.json();
    const container = document.getElementById("modelsContainer");
    container.innerHTML = "";
    models.forEach(m => {
        const card = document.createElement("div");
        card.className = "model-card";
        card.innerHTML = `
            <h3>${m.name}</h3>
            <div class="hashrate">${m.hashRate} H/s</div>
            <button onclick="startMining('\( {m.id}', ' \){m.name}')">Uruchom ${m.name}</button>
        `;
        container.appendChild(card);
    });
}

async function startMining(modelId, modelName) {
    const addr = document.getElementById("minerAddress").value.trim();
    if (!addr) return alert("Podaj adres!");
    const status = document.getElementById("status");
    status.innerHTML = `<span class="mining">⛏️ ${modelName} pracuje...</span>`;
    try {
        const res = await fetch(API + "/mine/start", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({minerAddress:addr, modelId})
        });
        const data = await res.json();
        status.innerHTML = `✅ Sukces! Blok #${data.blockHeight} | Nagroda: ${data.reward} BBC`;
    } catch(e) { status.textContent = "Błąd kopania"; }
}

setInterval(loadModels, 7000);
loadModels();
</script>
</body>
</html>
