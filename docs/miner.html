<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BBC Miner • vMax Series</title>
<style>
    body {
        margin: 0;
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: Consolas, "JetBrains Mono", monospace;
        text-align: center;
    }
    header {
        background: #111;
        padding: 20px;
        border-bottom: 2px solid #222;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .logo { font-size: 24px; color: #00ffaa; font-weight: bold; text-shadow: 0 0 10px #00ffaa; }
    
    main { max-width: 900px; margin: 30px auto; padding: 20px; }
    .models {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin: 30px 0;
    }
    .model-card {
        background: #111;
        border: 2px solid #222;
        border-radius: 10px;
        padding: 20px;
        transition: all 0.3s;
    }
    .model-card:hover {
        border-color: #00ffaa;
        transform: translateY(-8px);
    }
    .hashrate { font-size: 32px; font-weight: bold; color: #00ffaa; }
    button {
        width: 100%;
        padding: 14px;
        background: #00ffaa;
        color: #000;
        border: none;
        font-weight: bold;
        cursor: pointer;
        border-radius: 6px;
        margin-top: 15px;
    }
    button:hover { background: #00dd99; }
    button:disabled { background: #555; cursor: not-allowed; }

    #status {
        margin: 25px 0;
        padding: 20px;
        background: #111;
        border: 1px solid #222;
        border-radius: 10px;
        min-height: 80px;
        font-size: 16px;
    }
    .mining {
        animation: miningPulse 1.2s infinite alternate;
        color: #00ff88;
    }
    @keyframes miningPulse {
        from { opacity: 0.6; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1.02); }
    }
    .success { color: #00ffaa; }
</style>
</head>
<body>

<header>
    <div class="logo">BBC MINER vMax</div>
    <a href="index.html" style="color:#888; text-decoration:none;">← Home</a>
</header>

<main>
    <h2>Wybierz model koparki vMax</h2>
    <div class="models" id="modelsContainer"></div>

    <input type="text" id="minerAddress" placeholder="Twój adres BBC (BbC...)" 
           style="width:80%; padding:12px; background:#111; border:1px solid #333; color:white; border-radius:6px; margin:15px 0;">

    <div id="status">Wybierz koparkę i podaj adres portfela...</div>
</main>

<script>
const API = "http://localhost:5000";   // ← ZMIEŃ NA SWÓJ LINK PO WDROŻENIU

async function loadModels() {
    try {
        const res = await fetch(API + "/miners/models");
        const models = await res.json();
        const container = document.getElementById("modelsContainer");
        container.innerHTML = "";

        models.forEach(model => {
            const card = document.createElement("div");
            card.className = "model-card";
            card.innerHTML = `
                <h3>${model.name}</h3>
                <div class="hashrate">${model.hashRate} H/s</div>
                <div>Pobór mocy: ${model.power}W</div>
                <div>Efektywność: ${model.efficiency} J/H</div>
                <button onclick="startMining('\( {model.id}', ' \){model.name}')">Uruchom ${model.name}</button>
            `;
            container.appendChild(card);
        });
    } catch(e) {
        console.error("Błąd ładowania modeli");
    }
}

async function startMining(modelId, modelName) {
    const address = document.getElementById("minerAddress").value.trim();
    if (!address) {
        alert("Podaj adres portfela!");
        return;
    }

    const status = document.getElementById("status");
    status.innerHTML = `⛏️ <span class="mining">Kopanie ${modelName} w toku...</span>`;

    try {
        const res = await fetch(API + "/mine/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ minerAddress: address, modelId: modelId })
        });

        const data = await res.json();

        if (data.status === "mined") {
            status.innerHTML = `
                ✅ <span class="success">Sukces!</span><br>
                Wydobyto blok #${data.blockHeight}<br>
                Nagroda: <b>${data.reward} BBC</b><br>
                <small>Hash: ${data.hash ? data.hash.slice(0, 12) + '...' : ''}</small>
            `;
        }
    } catch (e) {
        status.innerHTML = "❌ Błąd podczas kopania";
    }
}

// Auto-odświeżanie listy modeli
setInterval(loadModels, 7000);
loadModels();
</script>

</body>
</html>
