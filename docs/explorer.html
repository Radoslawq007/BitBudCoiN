<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BBC Chain Explorer</title>
<style>
    body{
    margin:0;
    background:#070707;
    color:#eee;
    font-family:Consolas,monospace;
}

header{

    background:#101010;

    border-bottom:2px solid #00ffaa;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:18px 35px;

}

.logoBox{

    display:flex;

    align-items:center;

    gap:15px;

}

.logoImg{

    height:60px;

}

.logoTitle{

    color:#00ffaa;

    font-size:28px;

    font-weight:bold;

}

.logoSub{

    color:#888;

    font-size:13px;

}

.networkBox{

    text-align:right;

    line-height:28px;

}

.networkBox span{

    color:#00ffaa;

    margin-left:10px;

}
</style>
</head>
<body>

<header>

    <div class="logoBox">

        <img src="logo.png" class="logoImg">

        <div>

            <div class="logoTitle">
                BitBudCoin Explorer
            </div>

            <div class="logoSub">
                Mainnet Candidate
            </div>

        </div>

    </div>

    <div class="networkBox">

        <div>
            🌐 Network
            <span>BitBudCoin</span>
        </div>

        <div>
            🟢 Status
            <span>ONLINE</span>
        </div>

        <div>
            ⛏ Block Time
            <span>8 min</span>
        </div>

    </div>

</header>

<main>
    <h2>Ostatnie bloki</h2>
    <table id="blocksTable">
        <thead>
            <tr><th>#</th><th>Hash</th><th>Miner</th><th>Reward</th><th>Czas</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</main>

<script>
const API = "http://localhost:5000";

async function loadBlocks() {
    try {
        const res = await fetch(API + "/blocks");
        const blocks = await res.json();
        const tbody = document.querySelector("#blocksTable tbody");
        tbody.innerHTML = "";

        blocks.slice(-10).reverse().forEach(b => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${b.height}</td>
                <td class="hash">${b.hash ? b.hash.slice(0,16)+'...' : '–'}</td>
                <td>${b.miner ? b.miner.slice(0,12)+'...' : '–'}</td>
                <td>${b.reward} BBC</td>
                <td>${new Date(b.timestamp).toLocaleTimeString()}</td>
            `;
            tbody.appendChild(tr);
        });
    } catch(e) {
        console.log("Błąd ładowania bloków");
    }
}

loadBlocks();
setInterval(loadBlocks, 5000);
</script>
</body>
</html>
